<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dulcinea Designer - Espacio Creativo</title>
    <style>
        /* Importación de fuentes alternativas de Google Fonts en caso de no tener locales */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Pacifico&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Fondo matizado rosa, lila y azul */
            background: linear-gradient(135deg, #ffc0cb, #e6e6fa, #add8e6);
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px 10px;
        }

        /* --- PERFIL --- */
        .perfil-container {
            text-align: center;
            margin-bottom: 25px;
        }

        /* Círculo con parpadeo de colores morado, rosa, lila y azul */
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid transparent;
            animation: parpadeoCirculo 3s infinite;
        }

        @keyframes parpadeoCirculo {
            0% { border-color: #800080; box-shadow: 0 0 10px #800080; } /* Morado */
            25% { border-color: #ff69b4; box-shadow: 0 0 10px #ff69b4; } /* Rosa */
            50% { border-color: #da70d6; box-shadow: 0 0 10px #da70d6; } /* Lila */
            75% { border-color: #00bfff; box-shadow: 0 0 10px #00bfff; } /* Azul */
            100% { border-color: #800080; box-shadow: 0 0 10px #800080; }
        }

        /* Nombre Dulcinea abajo de la foto, tipografía Vito Bold (simulada), tamaño 20, efecto 4D y parpadeo */
        .nombre-perfil {
            font-family: 'Vito Bold', 'Arial Black', sans-serif;
            font-size: 20px;
            font-weight: bold;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            /* Efecto Letra 4D (sombras múltiples para profundidad) */
            text-shadow: 
                1px 1px 0px #fff, 
                2px 2px 0px #ddd, 
                3px 3px 0px #bbb, 
                4px 4px 5px rgba(0,0,0,0.3);
            animation: parpadeoTexto 2s infinite;
        }

        @keyframes parpadeoTexto {
            0%, 100% { color: #da70d6; } /* Lila */
            33% { color: #ff69b4; }    /* Rosa */
            66% { color: #00bfff; }    /* Azul */
        }

        /* --- MENSAJE ANIMADO --- */
        .mensaje-alerta {
            font-size: 15px;
            color: #800080; /* Morado */
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
            animation: aparecerDesaparecer 2.5s infinite;
        }

        @keyframes aparecerDesaparecer {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* --- CONTENEDOR PRINCIPAL / FEED --- */
        .feed-container {
            width: 100%;
            max-width: 600px; /* Tamaño ideal estilo celular/computadora centrado */
            display: flex;
            flex-direction: column;
            gap: 25px; /* Separa cada publicación */
        }

        /* --- PUBLICACIONES (CUADROS LARGOS) --- */
        .publicacion {
            background-color: #800080; /* Cuarto largo color Morado */
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            width: 100%;
        }

        /* Título superior de cada publicación (No dice sección, van en línea) */
        .publicacion-titulo {
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            border-bottom: 2px solid rgba(255,255,255,0.2);
            padding-bottom: 5px;
        }

        /* Galería interna - Fondo lila */
        .galeria-contenido {
            background-color: #e6e6fa; /* Color dentro galería lila */
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        /* --- ELEMENTOS DE LA GALERÍA --- */
        .item-galeria {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.6);
            padding: 8px;
            border-radius: 6px;
            width: calc(50% - 8px); /* Dos columnas en móvil */
            min-width: 120px;
        }

        /* Nombre arriba del link/imagen con parpadeo azul lila */
        .item-nombre {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 6px;
            text-align: center;
            animation: parpadeoAzulLila 2s infinite;
        }

        @keyframes parpadeoAzulLila {
            0%, 100% { color: #00bfff; } /* Azul */
            50% { color: #9370db; }    /* Lila */
        }

        /* Imagen/GIF tamaño chico, cuadro mediano de contenedor, contorno línea punteada negra */
        .img-item {
            width: 100%;
            max-width: 110px; /* Medida chica para los gifs/imágenes */
            height: auto;
            aspect-ratio: 1 / 1;
            object-fit: contain;
            border: 2px dashed #000000; /* Cuadro contor linea putudiada color negro */
            background-color: #fff;
        }

        /* --- PIE DE PÁGINA --- */
        footer {
            margin-top: 40px;
            margin-bottom: 20px;
            text-align: center;
            width: 100%;
        }

        /* Fuente amore (simulada con Pacifico/Cursiva), tamaño 11 */
        .pie-texto {
            font-family: 'Amore', 'Pacifico', cursive;
            font-size: 11px;
            color: #4a4a4a;
        }

        /* --- RESPONSIVO PARA COMPUTADORA --- */
        @media (min-width: 768px) {
            .item-galeria {
                width: calc(33.33% - 10px); /* Tres columnas en pantallas grandes */
            }
        }
    </style>
</head>
<body>
