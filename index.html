<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dulcinea Designer - Blog</title>
    <style>
        /* Importación de fuentes */
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Great+Vibes&display=swap');

        /* Fuentes personalizadas (Alternativas web seguras si no están locales) */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ffc0cb, #e6e6fa, #87ceeb); /* Matizado Rosa, Lila y Azul */
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- PERFIL --- */
        .profile-container {
            text-align: center;
            margin: 30px 10px 10px 10px;
        }

        .profile-pic {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid transparent;
            animation: borderBlink 2s infinite alternate;
        }

        .profile-name {
            font-family: 'Fredoka', 'Arial Black', sans-serif; /* Simulación de letra 4D/Vito Bold */
            font-size: 20px;
            margin-top: 10px;
            color: #fff;
            text-shadow: 2px 2px 0px #8a2be2, -2px -2px 0px #ff69b4, 3px 3px 5px rgba(0,0,0,0.3);
            animation: textBlink 3s infinite;
        }

        /* --- MENSAJE FLOTANTE --- */
        .banner-message {
            font-size: 15px;
            color: #4b0082; /* Morado */
            font-weight: bold;
            text-align: center;
            margin: 15px;
            padding: 10px;
            animation: fadeInOut 2.5s infinite ease-in-out;
        }

        /* --- CONTENEDOR PRINCIPAL / FEED --- */
        .main-container {
            width: 90%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-bottom: 50px;
        }

        /* --- PUBLICACIONES (CUADROS LARGOS) --- */
        .post-card {
            background-color: #4b0082; /* Cuadro largo color Morado */
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }

        /* Fondo lila dentro de cada sección de la publicación */
        .gallery-content {
            background-color: #e6e6fa; /* Fondo Lila interno */
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
        }

        .gallery-title {
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            margin: 5px 0 10px 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- REJILLA DE GALERÍA DE IMÁGENES --- */
        .grid-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            justify-items: center;
        }

        /* Elemento individual de la galería */
        .item-box {
            background: #fff;
            padding: 8px;
            border: 2px dashed #000000; /* Cuadro contorno línea punteada negra */
            border-radius: 6px;
            text-align: center;
            width: 100%;
            max-width: 140px;
            box-sizing: border-box;
        }

        .item-title {
            font-size: 11px;
            font-weight: bold;
            color: #333;
            margin-bottom: 6px;
            word-wrap: break-word;
        }

        /* Medida chica para los GIFs e imágenes */
        .media-asset {
            width: 100%;
            max-width: 110px;
            height: auto;
            display: block;
            margin: 0 auto;
            border-radius: 4px;
        }

        /* Imagen única para las secciones estáticas */
        .single-asset-box {
            display: flex;
            justify-content: center;
            padding: 10px;
        }

        .medium-box {
            background: #fff;
            padding: 10px;
            border: 2px dashed #000000; /* Línea punteada negra */
            border-radius: 6px;
            max-width: 300px;
            width: 100%;
            text-align: center;
        }

        .medium-box img {
            width: 100%;
            height: auto;
            border-radius: 4px;
        }

        /* --- PIE DE PÁGINA --- */
        footer {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            padding: 15px 0;
            text-align: center;
            margin-top: auto;
        }

        .footer-text {
            font-family: 'Great Vibes', 'Brush Script MT', cursive; /* Fuente Amore / Romántica */
            font-size: 16px; /* Tamaño aproximado número 1 ajustado a escala web */
            color: #4b0082;
            margin: 0;
        }

        /* --- ANIMACIONES (ANIMACIONES DE PARPADEO Y EFECTOS) --- */
        @keyframes borderBlink {
            0% { border-color: #8a2be2; }   /* Morado */
            33% { border-color: #ff69b4; }  /* Rosa */
            66% { border-color: #e6e6fa; }  /* Lila */
            100% { border-color: #87ceeb; } /* Azul */
        }

        @keyframes textBlink {
            0%, 100% { color: #e6e6fa; }    /* Lila */
            33% { color: #ff69b4; }         /* Rosa */
            66% { color: #87ceeb; }         /* Azul */
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* --- RESPONSIVE OPTIMIZATION --- */
        @media (max-width: 600px) {
            .grid-gallery {
                grid-template-columns: repeat(2, 1fr); /* Dos columnas fijas en celulares */
            }
            .main-container {
                width: 95%;
            }
        }
    </style>
</head>
<body>
