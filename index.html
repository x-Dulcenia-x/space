<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dulcinea Designer</title>
    <!-- Importación de fuentes alternativas de Google Fonts en caso de no tener locales -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Pacifico&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- ESTILOS GENERALES Y FONDO MATIZADO --- */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ffc0cb, #e6e6fa, #87ceeb); /* Rosa, Lila y Azul */
            background-size: 400% 400%;
            animation: gradientBg 15s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- CONTENEDOR PRINCIPAL RESPONSIVE --- */
        .main-container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* --- PERFIL (FOTO Y NOMBRE 4D) --- */
        .profile-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .avatar-container {
            width: 80px;
            height: 80px;
            margin: 0 auto;
            position: relative;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            animation: profileBlink 2s infinite alternate;
        }

        /* Parpadeo de colores: Morado, Rosa, Lila, Azul */
        @keyframes profileBlink {
            0% { box-shadow: 0 0 15px #8a2be2; border: 4px solid #8a2be2; }
            33% { box-shadow: 0 0 15px #ff69b4; border: 4px solid #ff69b4; }
            66% { box-shadow: 0 0 15px #da70d6; border: 4px solid #da70d6; }
            100% { box-shadow: 0 0 15px #00bfff; border: 4px solid #00bfff; }
        }

        .profile-name {
            font-family: 'Vito Bold', 'Poppins', sans-serif;
            font-weight: 900;
            font-size: 20px;
            margin-top: 15px;
            color: #8a2be2;
            text-transform: uppercase;
            letter-spacing: 2px;
            /* Efecto Letra 4D / Estereoscópico */
            text-shadow: 
                2px 2px 0px #ff69b4, 
                -2px -2px 0px #00bfff,
                4px 4px 5px rgba(0,0,0,0.3);
            display: inline-block;
        }

        /* --- MENSAJE CON EFECTO APARECER/DESAPARECER --- */
        .alert-message {
            text-align: center;
            font-size: 15px;
            color: #8a2be2;
            font-weight: bold;
            margin: 20px 0;
            padding: 10px;
            animation: blinkEffect 2.5s infinite;
        }

        @keyframes blinkEffect {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* --- ESTRUCTURA DE PUBLICACIONES --- */
        .post-card {
            background-color: #8a2be2; /* Cuarto largo color Morado */
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 25px; /* Separación de publicaciones */
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .post-gallery-inner {
            background-color: #e6e6fa; /* Fondo lila dentro de cada sección/galería */
            border-radius: 8px;
            padding: 15px;
        }

        /* --- DISEÑO DE LAS GALERÍAS (Alineadas en cuadrícula) --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            justify-content: center;
        }

        .gallery-item {
            background: #e6e6fa;
            padding: 10px;
            text-align: center;
            box-sizing: border-box;
        }

        /* Cuadro mediano con línea punteada negra para cada foto */
        .item-box {
            border: 2px dashed #000000;
            padding: 10px;
            background-color: #f8f8ff;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 150px;
        }

        .item-title {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        /* Los gif tienen medida chica */
        .gif-small {
            max-width: 110px;
            max-height: 110px;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        /* Imagen estática para los placeholders */
        .img-placeholder {
            width: 100%;
            max-width: 120px;
            height: auto;
            border-radius: 4px;
        }

        /* Parpadeo de color Azul y Lila para textos específicos */
        .blink-blue-lila {
            animation: blueLilaBlink 1.5s infinite alternate;
            font-weight: bold;
        }

        @keyframes blueLilaBlink {
            0% { color: #00bfff; }
            100% { color: #da70d6; }
        }

        /* --- PIE DE PÁGINA --- */
        footer {
            text-align: center;
            padding: 20px;
            margin-top: auto;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.2);
        }

        .footer-text {
            font-family: 'Pacifico', 'Amore', cursive; /* Fuente Amore / Cursiva */
            font-size: 11px; /* Tamaño número 11 */
            color: #333;
        }
    </style>
</head>
<body>
