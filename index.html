<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dulcinea Designer - Blog</title>
    <style>
        /* Importación de fuentes elegantes alternativas para simular Vito Bold y Amore */
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Dosis:wght@500&family=Great+Vibes&display=swap');

        /* --- Variables de Colores --- */
        :root {
            --morado: #8a2be2;
            --rosa: #ff69b4;
            --lila: #da70d6;
            --azul: #1e90ff;
            --fondo-lila-suave: #f3e5f5;
        }

        /* --- Estilos Generales --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; /* Bloquea la selección de texto e imágenes */
            -webkit-user-drag: none; /* Evita arrastrar imágenes */
        }

        body {
            /* Fondo matizado morado, rosa, lila y azul */
            background: linear-gradient(135deg, var(--morado), var(--rosa), var(--lila), var(--azul));
            background-size: 400% 400%;
            animation: gradientBg 15s ease infinite;
            font-family: 'Dosis', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- Perfil de Usuario --- */
        .profile-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
            text-align: center;
        }

        .profile-pic-wrapper {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            padding: 4px; /* Espacio para el efecto de parpadeo */
            display: flex;
            align-items: center;
            justify-content: center;
            animation: borderBlink 3s linear infinite;
        }

        .profile-pic-wrapper img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            pointer-events: none;
        }

        /* Parpadeo de colores del círculo: morado, rosa, lila, azul */
        @keyframes borderBlink {
            0%, 100% { background-color: var(--morado); box-shadow: 0 0 10px var(--morado); }
            25% { background-color: var(--rosa); box-shadow: 0 0 10px var(--rosa); }
            50% { background-color: var(--lila); box-shadow: 0 0 10px var(--lila); }
            75% { background-color: var(--azul); box-shadow: 0 0 10px var(--azul); }
        }

        /* Nombre Dulcinea (Letra 4D simulada con múltiples sombras) */
        .profile-name {
            font-family: 'Archivo Black', sans-serif; /* Alternativa a Vito Bold */
            font-size: 20px;
            color: #fff;
            margin-top: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 
                1px 1px 0px var(--lila),
                2px 2px 0px var(--morado),
                3px 3px 0px var(--azul),
                4px 4px 5px rgba(0,0,0,0.5);
        }

        /* --- Mensaje Especial Animado --- */
        .alert-message {
            font-size: 15px;
            color: #4a0e4e; /* Tono morado oscuro para legibilidad */
            font-weight: bold;
            background: rgba(255, 255, 255, 0.85);
            padding: 10px 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            animation: fadeInOut 3s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* --- Contenedor de la Galería Lila --- */
        .gallery-container {
            background-color: #e8dbf0; /* Color dentro de la galería lila */
            width: 100%;
            max-width: 1100px;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        /* --- Secciones de la Galería --- */
        .gallery-section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 22px;
            color: #fff;
            background: var(--morado);
            padding: 8px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: inline-block;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }

        /* Grid que alinea los cuadros en línea de forma responsive */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        /* --- Cuadros de Publicación --- */
        .post-card {
            background-color: var(--fondo-lila-suave); /* Fondo de cada publicación lila chico */
            border: 2px dashed #000000; /* Cuadro contorno línea punteada color negro */
            border-radius: 10px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: relative;
        }

        /* Nombre arriba del contenido multimedia */
        .item-title {
            font-size: 15px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            text-align: center;
        }

        /* Parpadeo Azul y Lila específico para la sección Gif4d */
        .blink-blue-lilac {
            animation: blueLilacBlink 2s linear infinite;
        }

        @keyframes blueLilacBlink {
            0%, 100% { color: var(--azul); text-shadow: 0 0 5px var(--azul); }
            50% { color: var(--morado); text-shadow: 0 0 5px var(--morado); }
        }

        /* Contenedor de la Imagen/GIF (Tamaño mediano/chico controlado) */
        .media-box {
            width: 100%;
            height: 160px; /* Cuadro mediano estándar */
            background-color: var(--morado); /* Cuarto largo interno color Morado */
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .media-box img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Ajusta la imagen sin deformarla */
            pointer-events: none; /* Bloquea interacciones sobre la imagen */
        }

        /* Capa protectora transparente para evitar click derecho y arrastre en celulares */
        .shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 10;
        }

        /* --- Pie de Página --- */
        footer {
            margin-top: auto;
            padding: 25px 0 10px 0;
            text-align: center;
            width: 100%;
        }

        .footer-text {
            font-family: 'Great Vibes', cursive; /* Fuente tipo Amore/Romántica */
            font-size: 19px; /* Tamaño número 19 aprox (cercano a 1) */
            color: #fff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
        }

        /* --- Ajustes Móviles --- */
        @media (max-width: 600px) {
            .items-grid {
                grid-template-columns: 1fr; /* Un solo cuadro por fila en pantallas muy chicas */
            }
            .gallery-container {
                padding: 15px;
            }
        }
    </style>
</head>

    <!-- Script de seguridad para bloquear descargas y guardado de imágenes -->
    <script>
        // Deshabilitar atajos de teclado comunes para guardar o inspeccionar (Ctrl+S, Ctrl+U, F12)
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key === 's' || e.key === 'S' || e.key === 'u' || e.key === 'U')) {
                e.preventDefault();
            }
            if (e.key === 'F12') {
                e.preventDefault();
            }
        });

        // Bloqueo adicional para pantallas táctiles (evita mantener presionado para guardar imagen)
        document.querySelectorAll('.shield').forEach(shield => {
            shield.addEventListener('contextmenu', e => e.preventDefault());
            shield.addEventListener('touchstart', e => {
                // Permite el scroll pero previene el menú contextual del móvil
            }, {passive: true});
        });
    </script>
