<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dulcinea Designer - Blog</title>
    
    <!-- Importación de Fuentes de Google como alternativa/estilo si no están locales -->
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Dancing+Script&display=swap" rel="stylesheet">
    
    <style>
        /* Fuentes personalizadas */
        @font-face {
            font-family: 'Vito Bold';
            src: local('Vito Bold'), local('Vito-Bold');
            font-weight: bold;
        }

        @font-face {
            font-family: 'Amore';
            src: local('Amore');
        }

        /* Estilos Generales y Fondo Matizado */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #ffbcd9, #e0b0ff, #b4d6f2);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Contenedor Principal (Estilo Facebook/Blog) */
        .main-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* --- PERFIL --- */
        .profile-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-img-container {
            width: 80px;
            height: 80px;
            position: relative;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Animación de parpadeo del borde del círculo */
            animation: blinkCircle 2s infinite alternate;
        }

        .profile-img-container img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* Nombre Dulcinea Letra 4D (Efecto de relieve con sombras) */
        .profile-name {
            font-family: 'Vito Bold', sans-serif;
            font-size: 20px;
            margin-top: 15px;
            color: #ffffff;
            text-shadow: 
                0 1px 0 #ccc, 0 2px 0 #c9c9c9, 0 3px 0 #bbb, 0 4px 0 #b9b9b9, 
                0 5px 0 #aaa, 0 6px 1px rgba(0,0,0,.1), 0 0 5px rgba(0,0,0,.1), 
                0 1px 3px rgba(0,0,0,.3), 0 3px 5px rgba(0,0,0,.2), 0 5px 10px rgba(0,0,0,.25), 
                0 10px 10px rgba(0,0,0,.2), 0 20px 20px rgba(0,0,0,.15);
            /* Animación de parpadeo de texto */
            animation: blinkText 2.5s infinite;
        }

        /* --- MENSAJE ANMADO (Aparece y Desaparece) --- */
        .announcement-message {
            font-size: 15px;
            color: #4a0e4e; /* Morado */
            font-weight: bold;
            text-align: center;
            margin: 10px 0;
            animation: fadeInOut 3s infinite ease-in-out;
        }

        /* --- PUBLICACIONES / SECCIONES --- */
        .post-container {
            background-color: #4a0e4e; /* Cuarto largo color Morado */
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .gallery-box {
            background-color: #e6d8f2; /* Fondo lila dentro de la galería */
            border-radius: 8px;
            padding: 15px;
        }

        .gallery-title {
            font-family: 'Vito Bold', sans-serif;
            font-size: 18px;
            color: #4a0e4e;
            margin-bottom: 15px;
            border-bottom: 2px dashed #4a0e4e;
            padding-bottom: 5px;
        }

        /* Grid de imágenes alineadas */
        .grid-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            justify-content: center;
        }

        /* Items de la Galería */
        .gallery-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .item-title {
            font-size: 12px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
            height: 32px; /* Espacio fijo para alineación */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Contenedor de la imagen con línea punteada negra */
        .img-wrapper {
            border: 2px dashed #000000; /* Cuadro contorno linea putudiada color negro */
            padding: 4px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 120px; /* Medida chica para los GIFs */
            aspect-ratio: 1 / 1;
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* --- PIE DE PÁGINA --- */
        footer {
            margin-top: 40px;
            padding: 15px;
            text-align: center;
            width: 100%;
        }

        .footer-text {
            font-family: 'Amore', 'Dancing Script', cursive;
            font-size: 14px; /* Tamaño adaptado visualmente para legibilidad */
            color: #4a0e4e;
        }

        /* ------ ANIMACIONES (KEYFRAMES) ------ */
        
        /* Parpadeo de color lila rosa azul morado (Círculo Perfil) */
        @keyframes blinkCircle {
            0% { border: 4px solid #e0b0ff; box-shadow: 0 0 10px #e0b0ff; }
            33% { border: 4px solid #ffbcd9; box-shadow: 0 0 10px #ffbcd9; }
            66% { border: 4px solid #b4d6f2; box-shadow: 0 0 10px #b4d6f2; }
            100% { border: 4px solid #8a2be2; box-shadow: 0 0 10px #8a2be2; }
        }

        /* Parpadeo de texto lila rosa azul (Nombre) */
        @keyframes blinkText {
            0%, 100% { color: #e0b0ff; }
            33% { color: #ffbcd9; }
            66% { color: #b4d6f2; }
        }

        /* Aparecer y desaparecer (Mensaje de atención) */
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .grid-gallery {
                grid-template-columns: repeat(2, 1fr); /* 2 columnas en celulares pequeños */
            }
        }
    </style>
</head>
<body>
