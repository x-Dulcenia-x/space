      <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dulcinea Space</title>
    <style>
        /* Fuentes de Google para estilos alternativos si no están locales */
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Ubuntu:wght@700&display=swap');

        /* Animación de fondo: Paisaje animado en tonos rosa, lila y azul */
        @keyframes paisajeAnimado {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Animaciones de Parpadeo (Blinking) */
        @keyframes parpadeoTextoNombre {
            0%, 100% { text-shadow: 0 0 10px #da70d6, 0 0 20px #da70d6, 2px 2px 0px #0000ff; color: #ffc0cb; }
            50% { text-shadow: 0 0 10px #0000ff, 0 0 20px #0000ff, 2px 2px 0px #da70d6; color: #da70d6; }
        }

        @keyframes parpadeoTextoMensaje {
            0%, 100% { color: #ffb6c1; text-shadow: 0 0 5px #ba55d3; }
            50% { color: #e6e6fa; text-shadow: 0 0 5px #00bfff; }
        }

        @keyframes parpadeoBorde {
            0%, 100% { border-color: #ff69b4; box-shadow: 0 0 8px #ff69b4; }
            33% { border-color: #da70d6; box-shadow: 0 0 8px #da70d6; }
            66% { border-color: #1e90ff; box-shadow: 0 0 8px #1e90ff; }
        }

        /* Estilos Generales */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(-45deg, #ffc0cb, #e6e6fa, #b0c4de, #da70d6);
            background-size: 400% 400%;
            animation: paisajeAnimado 15s ease infinite;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* Contenedor Principal (Estilo Feed de Red Social) */
        .main-container {
            width: 100%;
            max-width: 650px;
            margin-bottom: 60px;
        }

        /* Perfil de Usuario */
        .perfil-card {
            background: rgba(230, 230, 250, 0.9); /* Fondo Lila Claro dentro de galería/perfil */
            border: 2px solid #da70d6;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #da70d6;
            margin-bottom: 8px;
        }

        /* Nombre Dulcinea Letra 4D y Vito Bold */
        .nombre-usuario {
            font-family: 'Vito Bold', 'Ubuntu', sans-serif;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: parpadeoTextoNombre 2.5s infinite;
            margin-top: 5px;
            display: inline-block;
        }

        /* Mensaje de Atención */
        .mensaje-atencion {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            padding: 12px;
            margin: 15px 0 5px 0;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            animation: parpadeoTextoMensaje 2s infinite;
            border: 1px dashed #da70d6;
        }

        /* Publicaciones Individuales (Cuadros Largos Color Lila) */
        .publicacion {
            background: #e6e6fa; /* Color lila dentro de la galería */
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px; /* Separación entre cada publicación */
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            border: 1px solid #b0c4de;
        }

        .publicacion-titulo {
            font-family: 'Vito Bold', sans-serif;
            font-size: 18px;
            color: #4b0082;
            margin-bottom: 12px;
            border-bottom: 2px solid #da70d6;
            padding-bottom: 5px;
            font-weight: bold;
        }

        /* Grid de Contenido Interno */
        .galeria-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        /* Cada bloque de imagen/gif interno (Cuadro Mediano) */
        .item-galeria {
            background: rgba(255, 255, 255, 0.6);
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            flex: 1 1 calc(50% - 15px); /* Dos por fila en pantallas medianas */
            max-width: 280px;
            min-width: 140px;
        }

        .item-titulo {
            font-size: 12px;
            font-weight: bold;
            color: #4b0082;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        /* Ajuste de imágenes chicas con borde parpadeante individual */
        .img-chica {
            width: 100%;
            max-width: 130px; /* Medida chica solicitada */
            height: auto;
            border-radius: 5px;
            border: 3px solid #ff69b4;
            animation: parpadeoBorde 2s infinite;
            display: block;
            margin: 0 auto;
        }

        /* Pie de página */
        footer {
            width: 100%;
            text-align: center;
            padding: 15px;
            position: fixed;
            bottom: 0;
            left: 0;
            background: rgba(230, 230, 250, 0.9);
            border-top: 1px solid #da70d6;
        }

        /* Fuente Amore / Estilo Romance Script */
        .footer-texto {
            font-family: 'Amore', 'Great Vibes', cursive;
            font-size: 14px; /* Tamaño chico/número 1 equivalente sutil */
            color: #4b0082;
            letter-spacing: 1px;
        }

        /* Adaptabilidad para Celulares */
        @media (max-width: 480px) {
            .item-galeria {
                flex: 1 1 100%; /* Una sola columna en móviles pequeños */
                max-width: 100%;
            }
            .nombre-usuario {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

        <div class="publicacion">

                    <img src="https://xatimg.com/image/Z1bycZx2vevA.jpg" class="img-chica" alt="Imagen">

            </div>
        </div>

        <!-- PUBLICACIÓN 5: Pstyle -->
        <div class="publicacion">
            <div class="publicacion-titulo">Pstyle</div>

    </div>

    <!-- PIE DE PÁGINA CENTRAL -->
