<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dulcinea Space</title>
    <!-- Importación de fuentes elegantes y script para el pie de página -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Great+Vibes&family=Comfortaa:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* Estilos Generales y Fondo Matizado */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, #ffc0cb, #e6e6fa, #add8e6);
            background-size: 400% 400%;
            animation: gradientBg 15s ease infinite;
            font-family: 'Comfortaa', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px 10px;
        }

        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- Perfil Principal --- */
        .profile-container {
            text-align: center;
            margin-bottom: 25px;
        }
        .profile-pic {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        
        /* Nombre Dulcinea: Letra Vito Bold (simulada con peso), tamaño 20 y efecto 4D/Parpadeo */
        .profile-name {
            font-family: 'Cinzel', sans-serif; /* Alternativa Bold Elegante */
            font-size: 20px;
            font-weight: 900;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: blinkColors 3s infinite;
            /* Efecto 4D/Estereoscópico con sombras multi-capa */
            text-shadow: 
                1px 1px 0px #ff007f, 
                -1px -1px 0px #00ffff, 
                2px 2px 3px rgba(0,0,0,0.3);
        }

        @keyframes blinkColors {
            0%, 100% { color: #e6e6fa; text-shadow: 1px 1px 0px #ffc0cb, -1px -1px 0px #add8e6, 2px 2px 4px rgba(0,0,0,0.3); }
            33% { color: #ffc0cb; text-shadow: 1px 1px 0px #add8e6, -1px -1px 0px #e6e6fa, 2px 2px 4px rgba(0,0,0,0.3); }
            66% { color: #add8e6; text-shadow: 1px 1px 0px #e6e6fa, -1px -1px 0px #ffc0cb, 2px 2px 4px rgba(0,0,0,0.3); }
        }

        /* --- Mensaje Especial Animado --- */
        .fade-message {
            font-size: 15px;
            color: #800080; /* Morado */
            text-align: center;
            margin: 15px auto;
            font-weight: bold;
            max-width: 90%;
            animation: fadeInOut 4s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* --- Contenedor de la Galería (Estilo Muro de Red Social) --- */
        .feed-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 25px; /* Separación entre cada publicación */
        }

        /* Cuadro largo para cada publicación */
        .post-card {
            background-color: #e6e6fa; /* Color lila dentro de la galería */
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            width: 100%;
        }

        /* Títulos de las publicaciones */
        .post-title {
            font-size: 18px;
            color: #4b0082;
            margin-bottom: 15px;
            border-bottom: 2px solid rgba(255, 192, 203, 0.5);
            padding-bottom: 5px;
        }

        /* Alineación interna de las imágenes y GIFs */
        .gallery-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        /* Contenedor individual de cada elemento multimedia */
        .media-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .media-label {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
            animation: blinkBlueLilac 2s infinite;
        }

        @keyframes blinkBlueLilac {
            0%, 100% { color: #add8e6; }
            50% { color: #b19ffb; }
        }

        /* Ajuste de tamaño chico para GIFs e Imágenes de la galería */
        .gallery-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            animation: borderBlink 3s infinite;
        }

        /* Cuadro contorno con parpadeo rosa, lila y azul para cada elemento */
        @keyframes borderBlink {
            0%, 100% { border: 4px solid #ffc0cb; }
            33% { border: 4px solid #e6e6fa; }
            66% { border: 4px solid #add8e6; }
        }

        /* --- Pie de Página --- */
        footer {
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            width: 100%;
        }
        .footer-text {
            font-family: 'Great Vibes', cursive; /* Fuente Amore / Script */
            font-size: 24px; /* Equivalente visual a una escala destacada */
            color: #4b0082;
        }
    </style>
</head>
<body>

    <!-- Sección de Perfil -->
    <div class="profile-container">
        <img src="https://xatimg.com/image/qdh7T2GNGQAd.png" alt="Perfil Dulcinea" class="profile-pic">
        <div class="profile-name">Dulcinea</div>
    </div>

    <!-- Mensaje Especial que aparece y desaparece -->
    <div class="fade-message">
        ✨ ¡Atención!🌸 • Espacio creativo y personalizado con mucho amor.✨
    </div>

    <!-- Muro / Galería (Línea de publicaciones independientes en cuadros largos) -->
    <div class="feed-container">

        <!-- Publicación 1: Gif4d -->
        <div class="post-card">
            <div class="post-title">Gif4d</div>
            <div class="gallery-grid">
                <div class="media-item">
                    <div class="media-label">After 314</div>
                    <img src="https://i.ibb.co/TMxDzm4B/314-gisse-gif.gif" class="gallery-img">
                </div>
                <div class="media-item">
                    <div class="media-label">After 377</div>
                    <img src="https://i.ibb.co/4gj6D0cR/377-pareja-dorado-gif.gif" class="gallery-img">
                </div>
                <div class="media-item">
                    <div class="media-label">After 600</div>
                    <img src="https://i.ibb.co/WNJ7Sbxr/600-Affter-jahlize.gif" class="gallery-img">
                </div>
                <div class="media-item">
                    <div class="media-label">After 601</div>
                    <img src="https://i.ibb.co/KcSkBrwV/601-jahlize.gif" class="gallery-img">
                </div>
            </div>
        </div>

        <!-- Publicación 2: Parpadeos -->
        <div class="post-card">
            <div class="post-title">Parpadeos</div>
            <div class="gallery-grid">
                <div class="media-item">
                    <img src="https://xatimg.com/image/Z1bycZx2vevA.jpg" class="gallery-img">
                </div>
            </div>
        </div>

        <!-- Publicación 3: Pcback -->
        <div class="post-card">
            <div class="post-title">Pcback</div>
            <div class="gallery-grid">
                <div class="media-item">
                    <img src="https://xatimg.com/image/Z1bycZx2vevA.jpg" class="gallery-img">
                </div>
            </div>
        </div>

        <!-- Publicación 4: Pcback Gif -->
        <div class="post-card">
            <div class="post-title">Pcback Gif</div>
            <div class="gallery-grid">
                <div class="media-item">
                    <img src="https://xatimg.com/image/Z1bycZx2vevA.jpg" class="gallery-img">
                </div>
            </div>
        </div>

        <!-- Publicación 5: Pstyle -->
        <div class="post-card">
            <div class="post-title">Pstyle</div>
            <div class="gallery-grid">
                <div class="media-item">
                    <img src="https://xatimg.com/image/Z1bycZx2vevA.jpg" class="gallery-img">
                </div>
            </div>
        </div>

        <!-- Publicación 6: Pstyle Gif -->
        <div class="post-card">
            <div class="post-title">Pstyle Gif</div>
            <div class="gallery-grid">
                <div class="media-item">
                    <img src="https://xatimg.com/image/Z1bycZx2vevA.jpg" class="gallery-img">
                </div>
            </div>
        </div>

    </div>

    <!-- Pie de Página -->
    <footer>
        <div class="footer-text">2030 Creado por Dulcinea</div>
    </footer>

</body>
</html>
